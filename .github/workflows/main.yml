name: Android Emulator + Tailscale Fast

on:
  workflow_dispatch:

jobs:
  emulator:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Use prebuilt Android Emulator action (fast)
      - name: Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          script: adb devices

      # 3️⃣ Install Tailscale
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      # 4️⃣ Connect Tailscale
      - name: Start Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          sudo tailscale up --authkey $TAILSCALE_AUTHKEY --hostname github-emulator

      # 5️⃣ Verify Tailscale
      - name: Show Tailscale Status
        run: tailscale status
